services:
  - type: web
    name: loyal-edge-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: ENABLE_SCHEDULER
        value: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: API_BASKETBALL_KEY
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false
      - key: THE_ODDS_API_SPORT_KEYS
        value: soccer_epl,soccer_spain_la_liga,soccer_italy_serie_a,soccer_germany_bundesliga,soccer_france_ligue_one,soccer_uefa_champs_league
      - key: LIVE_INGEST_DAYS
        value: 7
      - key: MIN_TRAINING_ROWS
        value: 20
      - key: MODEL_DIR
        value: data/models
