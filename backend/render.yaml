services:
  - type: web
    name: loyal-edge-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: ENABLE_SCHEDULER
        value: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
